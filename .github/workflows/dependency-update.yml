name: Dependency Updates

on:
  schedule:
    # Run weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Update Python Dependencies
  update-python-deps:
    name: Update Python Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Check for outdated packages
        id: check-outdated
        run: |
          cd backend
          pip list --outdated --format=json > outdated.json
          if [ -s outdated.json ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Outdated packages found:"
            cat outdated.json
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "All packages are up to date"
          fi

      - name: Update dependencies
        if: steps.check-outdated.outputs.has_updates == 'true'
        run: |
          cd backend
          # Backup current requirements
          cp requirements.txt requirements.txt.backup
          
          # Update dependencies (excluding major versions)
          pip-compile --upgrade --resolver=backtracking requirements.in -o requirements.txt || \
          pip install --upgrade pip && pip list --format=freeze > requirements.txt

      - name: Create Pull Request
        if: steps.check-outdated.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update Python dependencies'
          title: '🔄 Update Python Dependencies'
          body: |
            ## Automated Dependency Update
            
            This PR updates Python dependencies to their latest compatible versions.
            
            ### Changes
            - Updated packages listed in `backend/requirements.txt`
            
            ### Testing
            - [ ] CI pipeline passes
            - [ ] Manual testing completed
            - [ ] No breaking changes detected
            
            ### Notes
            Please review the changes carefully and test thoroughly before merging.
            
            ---
            *This PR was automatically created by the dependency update workflow.*
          branch: deps/python-updates
          delete-branch: true
          labels: dependencies, python, automated

  # Update Node.js Dependencies
  update-node-deps:
    name: Update Node.js Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Check for outdated packages
        id: check-outdated
        run: |
          cd frontend
          npm outdated --json > outdated.json || true
          if [ -s outdated.json ] && [ "$(cat outdated.json)" != "{}" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Outdated packages found:"
            cat outdated.json
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "All packages are up to date"
          fi

      - name: Update dependencies
        if: steps.check-outdated.outputs.has_updates == 'true'
        run: |
          cd frontend
          # Update dependencies (respecting semver)
          npm update --save
          npm audit fix --audit-level=moderate || true

      - name: Create Pull Request
        if: steps.check-outdated.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update Node.js dependencies'
          title: '🔄 Update Node.js Dependencies'
          body: |
            ## Automated Dependency Update
            
            This PR updates Node.js dependencies to their latest compatible versions.
            
            ### Changes
            - Updated packages in `frontend/package.json` and `frontend/package-lock.json`
            
            ### Testing
            - [ ] CI pipeline passes
            - [ ] Frontend builds successfully
            - [ ] Manual testing completed
            - [ ] No breaking changes detected
            
            ### Notes
            Please review the changes carefully and test thoroughly before merging.
            
            ---
            *This PR was automatically created by the dependency update workflow.*
          branch: deps/node-updates
          delete-branch: true
          labels: dependencies, nodejs, automated

  # Update GitHub Actions
  update-github-actions:
    name: Update GitHub Actions
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub Actions versions
        uses: actions/github-script@v7
        id: update-actions
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const workflowsDir = '.github/workflows';
            const files = fs.readdirSync(workflowsDir);
            let hasUpdates = false;
            
            for (const file of files) {
              if (file.endsWith('.yml') || file.endsWith('.yaml')) {
                const filePath = path.join(workflowsDir, file);
                let content = fs.readFileSync(filePath, 'utf8');
                const originalContent = content;
                
                // Update common actions to latest versions
                content = content.replace(/actions\/checkout@v3/g, 'actions/checkout@v4');
                content = content.replace(/actions\/setup-python@v4/g, 'actions/setup-python@v5');
                content = content.replace(/actions\/setup-node@v3/g, 'actions/setup-node@v4');
                content = content.replace(/docker\/build-push-action@v4/g, 'docker/build-push-action@v5');
                content = content.replace(/docker\/setup-buildx-action@v2/g, 'docker/setup-buildx-action@v3');
                
                if (content !== originalContent) {
                  fs.writeFileSync(filePath, content);
                  hasUpdates = true;
                  console.log(`Updated ${file}`);
                }
              }
            }
            
            return hasUpdates;

      - name: Create Pull Request
        if: steps.update-actions.outputs.result == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(ci): update GitHub Actions versions'
          title: '🔄 Update GitHub Actions Versions'
          body: |
            ## Automated GitHub Actions Update
            
            This PR updates GitHub Actions to their latest versions.
            
            ### Changes
            - Updated action versions in workflow files
            
            ### Testing
            - [ ] All workflows run successfully
            - [ ] No breaking changes detected
            
            ### Notes
            Please review the changes and ensure all workflows still function correctly.
            
            ---
            *This PR was automatically created by the dependency update workflow.*
          branch: deps/actions-updates
          delete-branch: true
          labels: dependencies, github-actions, automated

  # Summary
  update-summary:
    name: Dependency Update Summary
    runs-on: ubuntu-latest
    needs: [update-python-deps, update-node-deps, update-github-actions]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## 🔄 Dependency Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Update Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Dependencies | ${{ needs.update-python-deps.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js Dependencies | ${{ needs.update-node-deps.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Actions | ${{ needs.update-github-actions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the Pull Requests tab for any created update PRs." >> $GITHUB_STEP_SUMMARY

