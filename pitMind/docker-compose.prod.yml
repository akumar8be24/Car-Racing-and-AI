version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: pitmind-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379" # Only expose to localhost
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pitmind-network

  postgres:
    image: postgres:16-alpine
    container_name: pitmind-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pitmind}
      POSTGRES_USER: ${POSTGRES_USER:-pitmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432" # Only expose to localhost
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pitmind}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pitmind-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pitmind-api-prod
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pitmind}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pitmind}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      OPEN_PIT_WALL_HOME: /data/replay
    volumes:
      - replay-data:/data/replay
    ports:
      - "127.0.0.1:8000:8000" # Only expose to localhost, reverse proxy will handle public traffic
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - pitmind-network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_URL: ${VITE_WS_URL:-}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_DATABASE_URL: ${VITE_FIREBASE_DATABASE_URL}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_WEB_API_KEY: ${VITE_FIREBASE_WEB_API_KEY}
    container_name: pitmind-web-prod
    volumes:
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:8080"  # Expose web application on standard HTTP port 80
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - pitmind-network

  replay:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["replay"]
    command:
      - python
      - -m
      - open_pit_wall
      - replay
      - --data-file
      - ${REPLAY_DATA_FILE:-/data/replay/computed_data/replay.json}
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --speed
      - ${REPLAY_SPEED:-1.0}
      - --autoplay
    environment:
      OPEN_PIT_WALL_HOME: /data/replay
    volumes:
      - replay-data:/data/replay
    ports:
      - "127.0.0.1:8765:8765"
    restart: unless-stopped
    networks:
      - pitmind-network

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  replay-data:
    driver: local

networks:
  pitmind-network:
    driver: bridge
