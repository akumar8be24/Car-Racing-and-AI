services:
  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: pitmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pitmind-network

  # PostgreSQL for persistent storage
  postgres:
    image: postgres:16-alpine
    container_name: pitmind-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pitmind}
      POSTGRES_USER: ${POSTGRES_USER:-pitmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pitmind}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pitmind}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pitmind-network

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://localhost:8080,http://0.0.0.0:5173}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://pitmind:pitmind@postgres:5432/pitmind}
      OPEN_PIT_WALL_HOME: /data/replay
    volumes:
      - replay-data:/data/replay
    ports:
      - "8001:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - pitmind-network

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_WS_URL: ${VITE_WS_URL:-}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_DATABASE_URL: ${VITE_FIREBASE_DATABASE_URL:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_WEB_API_KEY: ${VITE_FIREBASE_WEB_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - pitmind-network

  replay:
    build:
      context: ./backend
    profiles: ["replay"]
    command:
      - python
      - -m
      - open_pit_wall
      - replay
      - --data-file
      - ${REPLAY_DATA_FILE:-/data/replay/computed_data/replay.json}
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --speed
      - ${REPLAY_SPEED:-1.0}
      - --autoplay
    environment:
      OPEN_PIT_WALL_HOME: /data/replay
    volumes:
      - replay-data:/data/replay
    ports:
      - "8765:8765"
    networks:
      - pitmind-network

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  replay-data:
    driver: local

networks:
  pitmind-network:
    driver: bridge
